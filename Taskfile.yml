version: '3'

vars:
  GOCACHE: '{{.GOCACHE | default "/tmp/go-build"}}'
  LOCALBIN: '{{.TASKFILE_DIR}}/bin'
  ENVTEST_TOOLS_VERSION: '{{.ENVTEST_TOOLS_VERSION | default "release-0.23"}}'
  ENVTEST_K8S_VERSION: '{{.ENVTEST_K8S_VERSION | default "1.35.x"}}'

tasks:
  build:
    desc: Build the operator binary
    cmds:
      - mkdir -p bin
      - go build -o bin/operator ./cmd/operator/

  compile:
    desc: Check all packages compile without errors
    cmds:
      - go build ./...

  test:
    desc: Run all tests (unit + envtest)
    deps:
      - test-unit
      - test-envtest

  test-unit:
    desc: Run tests that do not require envtest API server binaries
    cmds:
      - GOCACHE={{.GOCACHE}} go test ./...

  install-envtest:
    desc: Install setup-envtest tool used to fetch local envtest binaries
    cmds:
      - mkdir -p {{.LOCALBIN}}
      - GOBIN={{.LOCALBIN}} go install sigs.k8s.io/controller-runtime/tools/setup-envtest@{{.ENVTEST_TOOLS_VERSION}}

  test-envtest:
    desc: Run envtest suites (requires local kube-apiserver/etcd test binaries)
    deps:
      - install-envtest
    cmds:
      - KUBEBUILDER_ASSETS="$({{.LOCALBIN}}/setup-envtest use {{.ENVTEST_K8S_VERSION}} --bin-dir {{.LOCALBIN}} -p path)" GOCACHE={{.GOCACHE}} go test -tags=envtest ./api/v1alpha1/tests

  run:
    desc: Run operator locally (requires kubeconfig)
    cmds:
      - go run ./cmd/operator/

  docker-build:
    desc: Build Docker image
    vars:
      TAG: '{{.TAG | default "latest"}}'
    cmds:
      - docker build -t klarity:{{.TAG}} .

  deploy-local:
    desc: Deploy to local k3d cluster
    cmds:
      - kubectl apply -f config/crd/bases/

  codegen:
    desc: Regenerate CRDs and deepcopy via controller-gen
    cmds:
      - ./hack/update-codegen.sh

  logs:
    desc: Tail operator logs
    cmds:
      - kubectl logs -n klarity-system -l app=klarity -f

  oom-test:
    desc: Deploy OOMKill test pod
    cmds:
      - kubectl apply -f examples/oomkill-test.yaml
